<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Resume Tailor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">RT</div>
          <div>
            <h1>Resume Tailor</h1>
            <p id="accountState">Free plan</p>
          </div>
        </div>
        <span id="quotaState" class="quota-chip"></span>
      </header>

      <section class="panel">
        <div class="panel-title">
          <span class="step-dot">1</span>
          <h2>Your resume</h2>
          <button id="clearResume" class="icon-button" type="button" title="Remove saved resume" aria-label="Remove saved resume">&times;</button>
        </div>
        <label class="file-picker">
          <input id="resumeFile" type="file" accept=".pdf,.docx,.txt,.md,.text,.csv,.json,.rtf">
          <span class="file-cta">Choose file</span>
          <span id="saveState" class="file-state">No resume yet</span>
        </label>
        <button id="downloadOriginal" type="button" class="ghost small" disabled>Download original file</button>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span class="step-dot">2</span>
          <h2>Generate for this job</h2>
        </div>
        <p id="jobState" class="hint">Open a job listing in this tab, then generate.</p>
        <div class="intensity" role="radiogroup" aria-label="How much should AI edit your resume?">
          <label class="intensity-option">
            <input type="radio" name="intensity" value="minimal">
            <span class="intensity-card"><strong>Light</strong><small>Few edits</small></span>
          </label>
          <label class="intensity-option">
            <input type="radio" name="intensity" value="balanced" checked>
            <span class="intensity-card"><strong>Medium</strong><small>Balanced</small></span>
          </label>
          <label class="intensity-option">
            <input type="radio" name="intensity" value="max">
            <span class="intensity-card"><strong>Max</strong><small>Deep rewrite</small></span>
          </label>
        </div>
        <button id="analyzeJob" type="button" class="primary big" disabled>Generate tailored PDF</button>
      </section>

      <section id="resultPanel" class="panel result-panel hidden" aria-live="polite">
        <div class="result-head">
          <div>
            <h2>Tailored resume</h2>
            <p id="generatedState" class="hint">No resume generated yet.</p>
          </div>
          <div id="matchPanel" class="match-panel hidden">
            <span id="matchValue" class="match-value">-</span>
            <span class="match-caption">job match</span>
            <span id="matchDelta" class="match-delta"></span>
          </div>
        </div>

        <div class="actions">
          <button id="downloadPdf" type="button" class="primary" disabled>Download PDF again</button>
          <button id="downloadDocx" type="button" class="ghost" disabled>DOCX</button>
        </div>

        <div id="upsellPanel" class="upsell hidden">
          <p>Your PDF includes a small watermark line at the bottom.</p>
          <button id="upgradeButton" type="button" class="primary">Remove watermark - Pro ($29/mo)</button>
        </div>

        <div class="chat-panel">
          <p class="chat-title">Refine with AI</p>
          <div id="chatLog" class="chat-log"></div>
          <div class="chat-row">
            <input id="chatInput" type="text" placeholder="e.g. Make the summary shorter" disabled>
            <button id="chatSend" type="button" class="primary" disabled>Send</button>
          </div>
        </div>

        <details class="editor">
          <summary>View &amp; edit resume text</summary>
          <textarea id="resumeDraft" rows="12" spellcheck="true" placeholder="Generated resume text"></textarea>
        </details>
      </section>
    </main>

    <script src="vendor/mammoth.browser.min.js"></script>
    <script src="vendor/pdf-lib.min.js"></script>
    <script src="vendor/docx.iife.js"></script>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
