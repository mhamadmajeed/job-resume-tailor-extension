<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Resume Tailor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Resume Tailor</h1>
          <p id="accountState">Free plan</p>
        </div>
        <button id="clearResume" class="icon-button" type="button" title="Clear saved resume" aria-label="Clear saved resume">
          <span aria-hidden="true">x</span>
        </button>
      </header>

      <div id="signedInContent">
        <section class="panel quota-panel">
          <p id="quotaState">-</p>
        </section>

        <section class="panel">
          <label class="file-picker">
            <span>Upload once</span>
            <input id="resumeFile" type="file" accept=".pdf,.docx,.txt,.md,.text,.csv,.json,.rtf">
          </label>
          <p id="saveState">No resume saved</p>

          <div class="actions">
            <button id="analyzeJob" type="button" class="primary" disabled>Generate resume</button>
            <button id="downloadOriginal" type="button" disabled>Original file</button>
          </div>
        </section>

        <section class="panel result-panel" aria-live="polite">
          <div class="result-head">
            <div>
              <h2>Generated Resume</h2>
              <p id="jobState">Generate, then refine with chat, then download.</p>
            </div>
            <div id="matchPanel" class="match-panel hidden">
              <span id="matchValue" class="match-value">-</span>
              <span class="match-caption">job match</span>
              <span id="matchDelta" class="match-delta"></span>
            </div>
          </div>
          <p id="generatedState" class="generated-state">No resume generated yet.</p>

          <div id="upsellPanel" class="upsell hidden">
            <p>This resume includes a small watermark line at the end.</p>
            <button id="upgradeButton" type="button" class="primary">Remove watermark - Upgrade to Pro ($29/mo)</button>
          </div>

          <label class="field">
            <span>Edit before download</span>
            <textarea id="resumeDraft" rows="12" spellcheck="true" placeholder="Generated resume will appear here"></textarea>
          </label>

          <div class="actions">
            <button id="downloadPdf" type="button" disabled>Download PDF</button>
            <button id="downloadDocx" type="button" disabled>Download DOCX</button>
          </div>
        </section>

        <section class="panel chat-panel">
          <h2>Refine with a prompt</h2>
          <div id="chatLog" class="chat-log"></div>
          <div class="actions">
            <input id="chatInput" type="text" placeholder="e.g. Make the summary shorter" disabled>
            <button id="chatSend" type="button" class="primary" disabled>Send</button>
          </div>
        </section>
      </div>
    </main>

    <script src="vendor/mammoth.browser.min.js"></script>
    <script src="vendor/pdf-lib.min.js"></script>
    <script src="vendor/docx.iife.js"></script>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
