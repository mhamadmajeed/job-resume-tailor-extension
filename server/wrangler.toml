name = "job-resume-tailor-server"
main = "src/index.js"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "resume-tailor-db"
database_id = "REPLACE_WITH_REAL_D1_ID"

[vars]
# Overridden locally by .dev.vars; set for real in `wrangler secret put` for production.
DEV_MODE = "true"
FREE_GENERATION_LIMIT = "5"
PRO_GENERATION_LIMIT = "100"
PRO_PRICE_ID = "price_REPLACE_ME"
